<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% extends 'base.html' %}

{% block content %}

<h1>Update Student</h1>

<form method="POST">

    {% csrf_token %}

    <input
        type="text"
        name="name"
        value="{{ student.name }}"
    >

    <br><br>

    <input
        type="number"
        name="age"
        value="{{ student.age }}"
    >

    <br><br>

    <input
        type="email"
        name="email"
        value="{{ student.email }}"
    >

    <br><br>

    <button type="submit">
        Update Student
    </button>

</form>

{% endblock %}
</body>
</html>
